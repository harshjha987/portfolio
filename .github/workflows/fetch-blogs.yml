name: Fetch Blog Posts

  "on":
    schedule:
      - cron: '0 0 * * *'
    workflow_dispatch:

  permissions:
    contents: write

  jobs:
    fetch-blogs:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4

        - uses: actions/setup-node@v4
          with:
            node-version: '20'

        - name: Fetch blog posts from RSS
          run: node scripts/fetch-blogs.mjs

        - name: Commit updated blogs.json
          run: |
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git config user.name "github-actions[bot]"
            git add src/data/blogs.json
            git diff --staged --quiet || git commit -m "chore: update blog posts data"
            git push
